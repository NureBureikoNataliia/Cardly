name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================================
  # TESTS
  # ============================================================================
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run app tests
        run: npm run test:app -- --passWithNoTests

      - name: Run SRS package tests
        run: npm run test:srs -- --passWithNoTests

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: matrix.node-version == '20.x'
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false
        continue-on-error: true

  # ============================================================================
  # LINTING & CODE QUALITY
  # ============================================================================
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Verify package.json syntax
        run: cat package.json | jq . > /dev/null

  # ============================================================================
  # BUILD APK
  # ============================================================================
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          if [ -z "$EAS_TOKEN" ]; then
            echo "EAS_TOKEN not configured. Skipping APK build."
            echo "To enable: Add EAS_TOKEN to GitHub Secrets"
            exit 0
          fi
          eas-cli build --platform android --profile preview --non-interactive
        continue-on-error: true

      - name: Download built APK
        if: ${{ env.EAS_TOKEN != '' }}
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: eas-cli build:download --platform android --latest --output cardly-preview.apk
        continue-on-error: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardly-apk
          path: cardly-preview.apk
          retention-days: 30
        continue-on-error: true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: cardly-preview.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # PR STATUS COMMENT
  # ============================================================================
  pr-status:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [test, lint]

    steps:
      - name: Comment PR with status
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'All checks passed! Ready to merge.'
            });
        continue-on-error: true
