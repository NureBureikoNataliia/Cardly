name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Відміняє попередні запуски того ж PR/гілки при новому push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run app tests
        run: npm run test:app

      - name: Run SRS tests
        run: npm run test:srs
